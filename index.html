<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spacer po mieszkaniu</title>
  <link rel="stylesheet" href="./src/styles.css?v=2" />
</head>
<body>

  <!-- Film w tle -->
  <video id="tour" preload="auto" muted playsinline>
    <source src="./teaser.mp4" type="video/mp4" />
  </video>

  <!-- Przezroczysty div przechwytujący scroll — na wierzchu, bez tła -->
  <div id="scroller">
    <div id="scroll-driver"></div>
  </div>

  <!-- UI nad scrollerem -->
  <div id="progress-line"></div>
  <div id="hint">↕ Scrolluj, aby poruszać się po mieszkaniu</div>

  <div id="loader">
    <div id="loader-track"><div id="loader-fill"></div></div>
    <p>Ładowanie spaceru…</p>
  </div>

  <script type="module" src="./src/video.js?v=2"></script>
</body>
</html>
